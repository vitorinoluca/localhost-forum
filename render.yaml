# Ejemplo: solo el build estático del cliente. Para API + SPA en un solo host usá un Web Service Node y build en la raíz (npm run build && npm start).
services:
  - type: web
    name: frontend
    runtime: static
    buildCommand: npm ci --include=dev && npm run build -w client
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
